dataset_name: captaincook_dataset
train_split: ['training', 'validation']
val_split: ['test']
dataset: {
  backbone: egovlp,
  division_type: recordings,
  videos_type: 'all',
  json_file: 'combined_recordings.json',
  feat_folder: '/content/drive/MyDrive/AML_Project/CaptainCook4D/features_egovlp_num_frames_16',
  file_prefix: ~,
  file_suffix: '_360p',
  file_ext: .npz,
  num_classes: 353,
  input_dim: 256,
  feat_stride: 30,
  num_frames: 30,   # num_frames: 30 represents the temporal window size (1s at 30fps) used for alignment in ActionFormer, 
                    # while the 16 frames in the extractor refer only to EgoVLP's internal subsampling rate.
  default_fps: 29.97,
  trunc_thresh: 0.3,
  crop_ratio: [0.9, 1.0],
  max_seq_len: 4096,
}
model: {
  # CORRETTO — riscalato ×3 per feature da 1s (EgoVLP)
  # [0,4]×3=[0,12], [2,8]×3=[6,24], ... → step da 6s a ore gestiti correttamente
  regression_range: [
    [0, 12],    # 0-12s: microazioni
    [6, 24],    # 6-24s: step brevi
    [12, 48],   # 12-48s: step medi
    [24, 96],   # 24-96s: step lunghi
    [48, 192],  # 48-192s: step molto lunghi
    [96, 384],  # 96-384s: fasi di ricetta
    [192, 768],
    [384, 10000]
  ],
  fpn_type: identity,
  backbone_arch: [2, 2, 7],
  max_buffer_len_factor: 4.0,
  n_mha_win_size: 9,
  use_abs_pe: true,
}
opt: {
  learning_rate: 0.0001,
  epochs: 16,
  weight_decay: 0.05,
  warmup_epochs: 5,   # already like this by default
}
loader: {
  batch_size: 2,
}
train_cfg: {
  init_loss_norm: 250,
  clip_grad_l2norm: 1.0,
  cls_prior_prob: 0.01,
  center_sample: radius,
  center_sample_radius: 1.5,
#  label_smoothing: 0.1,
  dropout: 0.1,
  droppath: 0.1,
}
test_cfg: {
  pre_nms_topk: 5000,
  max_seg_num: 2000,
  min_score: 0.001,
  nms_sigma: 0.9,
  multiclass_nms: True,
  voting_thresh: 0.95,
}
output_folder: /content/drive/MyDrive/AML_Project/step1/checkpoints